<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TrailerFlix - Portal de Trailers de Cinema</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/lucide-static@latest/font/lucide.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Audiowide&family=Roboto:ital,wght@0,100..900;1,100..900&family=Tektur:wght@400..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="movie-logo-modal" class="logo-modal"></div>

    <div class="Card">
      <div class="card-overlay"></div>

      <nav class="Left floating-menu">
        <div class="MenuTitle" style="text-align: center">
          <h2
            title="TrailerFlix - Portal de Trailers de Cinema"
            style="cursor: pointer"
          >
            Trailer<br />Flix
          </h2>
        </div>
        <div class="Divider">.</div>
        <div class="menu-items">
          <div class="Submenu active" title="Inicial">
            <div class="icon-house"></div>
          </div>
          <div class="Submenu" title="Filmes">
            <div class="icon-clapperboard"></div>
          </div>
          <div class="Submenu" title="Séries">
            <div class="icon-tv"></div>
          </div>
          <div class="Submenu" title="Mais Vistos">
            <div class="icon-trending-up"></div>
          </div>
          <div class="Submenu" title="Minha Lista">
            <div class="icon-heart"></div>
          </div>
        </div>
      </nav>

      <main class="main-content">
        <div class="fixed-top-area">
          <div class="banner-container curved-theater">
            <iframe
              id="main-player"
              class="video-banner"
              src="https://www.youtube.com/embed/62bIsvRcPv0?autoplay=1&mute=1&controls=0&rel=0&enablejsapi=1&playlist=62bIsvRcPv0&loop=1"
              title="YouTube video player"
              frameborder="0"
              allow="
                accelerometer;
                autoplay;
                clipboard-write;
                encrypted-media;
                gyroscope;
                picture-in-picture;
                web-share;
              "
              referrerpolicy="strict-origin-when-cross-origin"
              allowfullscreen
            ></iframe>
            <div id="current-movie-logo" class="current-logo-overlay"></div>
          </div>

          <div class="search-bar-integrated">
            <div class="icon-search"></div>
            <input
              type="text"
              placeholder="Pesquisa o nome do filme ou seriado"
            />
          </div>
        </div>

        <div class="scrollable-catalog">
          <section class="movies-section vertical-layout">
            <h2 class="section-title">Catálogo Completo</h2>
            <div class="movies-grid high-density"></div>
          </section>
        </div>
      </main>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="script.js"></script>
  </body>
</html>

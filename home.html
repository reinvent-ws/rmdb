<!-- Script Inteligente da API do YouTube + Lógica Aleatória Corrigida -->
<script src="https://www.youtube.com/iframe_api"></script>
<script>
  let player;
  const movieCards = document.querySelectorAll(".movie-card");
  const cardContainer = document.querySelector(".Card");
  const modal = document.getElementById("movie-logo-modal");

  // Função chamada automaticamente pela API do YouTube para configurar o player original
  function onYouTubeIframeAPIReady() {
    player = new YT.Player("main-player", {
      events: {
        onStateChange: onPlayerStateChange,
      },
    });
  }

  // Detecta quando o estado do vídeo muda (tocando, pausado, terminado...)
  function onPlayerStateChange(event) {
    // YT.PlayerState.ENDED significa que o vídeo terminou (valor 0)
    if (event.data === YT.PlayerState.ENDED) {
      playRandomMovie();
    }
  }

  // Função para trocar o vídeo e o background do .Card ao clicar
  movieCards.forEach((card) => {
    card.addEventListener("click", () => {
      const videoId = card.getAttribute("data-video");
      const imgSrc = card.querySelector("img").src;

      changeMovie(videoId, imgSrc);
    });
  });

  // Executa a mudança do vídeo e garante que o evento de fim continue funcionando
  function changeMovie(videoId, imgSrc) {
    if (videoId && player) {
      // Ajuste de segurança: Garante que a API do YouTube reconheça as funções de carregamento
      if (typeof player.loadVideoById === "function") {
        player.loadVideoById({
          videoId: videoId,
          startSeconds: 0,
        });
      } else {
        // Alternativa caso o player precise ser reiniciado com o evento ativo
        const iframe = document.getElementById("main-player");
        iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&controls=0&rel=0&enablejsapi=1`;

        // Recarrega o objeto da API para não perder o evento
        player = new YT.Player("main-player", {
          events: {
            onStateChange: onPlayerStateChange,
          },
        });
      }

      // Sempre garante que o player comece mutado (exigência do navegador para dar autoplay)
      if (typeof player.mute === "function") {
        player.mute();
      }

      // Altera o background-image da classe .Card de forma suave
      cardContainer.style.backgroundImage = `url('${imgSrc}')`;
    }
  }

  // Sorteia um filme aleatório da lista atual de 12 pôsteres
  function playRandomMovie() {
    const randomIndex = Math.floor(Math.random() * movieCards.length);
    const randomCard = movieCards[randomIndex];

    const videoId = randomCard.getAttribute("data-video");
    const imgSrc = randomCard.querySelector("img").src;

    changeMovie(videoId, imgSrc);
  }

  movieCards.forEach((card) => {
    // Quando o clique acontece, troca o vídeo normalmente
    card.addEventListener("click", () => {
      const videoId = card.getAttribute("data-video");
      const imgSrc = card.querySelector("img").src;
      changeMovie(videoId, imgSrc);
    });

    // 1. Quando o mouse entra no card do filme
    card.addEventListener("mouseenter", (e) => {
      const logoUrl = card.getAttribute("data-logo");

      // Se o card tiver um link de logo definido, ativa o modal
      if (logoUrl) {
        modal.style.backgroundImage = `url('${logoUrl}')`;
        modal.classList.add("active");
      }
    });

    // 2. Quando o mouse se move dentro do card, o modal flutua junto
    card.addEventListener("mousemove", (e) => {
      // Adicionamos +15 pixels em X e Y para o modal não ficar exatamente embaixo da seta do mouse
      modal.style.left = e.pageX + "px";
      modal.style.top = e.pageY - 30 + "px";
    });

    // 3. Quando o mouse sai do card do filme, o modal desaparece suavemente
    card.addEventListener("mouseleave", () => {
      modal.classList.remove("active");
    });
  });
</script>

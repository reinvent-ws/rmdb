<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>rMDB - Rayana Banco de Dados dos Filmes</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/lucide-static@latest/font/lucide.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Audiowide&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="Card">
      <nav>
        <h2>RMDB</h2>
        <div>
          <div class="Submenu">
            <div class="icon-house"></div>
            <h3>Inicial</h3>
          </div>
          <div class="Submenu">
            <div class="icon-clapperboard"></div>
            <h3>Filmes</h3>
          </div>
          <div class="Submenu">
            <div class="icon-circle-play"></div>
            <h3>Seriados</h3>
          </div>
          <div class="Submenu">
            <div class="icon-circle-play"></div>
            <h3>Favoritos</h3>
          </div>
        </div>
        <div>
          <h4>Account</h4>
          <h3>Amanda Flávia</h3>
          <h3>João Paulo</h3>
        </div>
      </nav>
      <div class="Right">
        <header>
          <div class="TopLeft">
            <div class="icon-search"></div>
            <div>Pesquisa o nome do filme ou seriado</div>
          </div>
          <div class="TopRight">
            <div class="icon-bell"></div>
            <div class="icon-user-round"></div>
            <div>Amanda</div>
          </div>
        </header>
        <div></div>
      </div>
    </div>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RMDB - Raya Banco de Dados dos Filmes</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/lucide-static@latest/font/lucide.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Audiowide&family=Roboto:ital,wght@0,100..900;1,100..900&family=Tektur:wght@400..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Elemento flutuante do modal -->
    <div id="movie-logo-modal" class="logo-modal"></div>

    <div class="Card">
      <nav class="Left">
        <div class="MenuTitle">
          <h2>RMDB</h2>
          <h5>
            Raya Banco <br />
            de Dados dos Filmes
          </h5>
        </div>
        <div class="Divider">.</div>
        <div>
          <div class="Submenu">
            <div class="icon-house"></div>
            <h3>Inicial</h3>
          </div>
          <div class="Submenu">
            <div class="icon-clapperboard"></div>
            <h3>Filmes</h3>
          </div>
          <div class="Submenu">
            <div class="icon-play"></div>
            <h3>Seriados</h3>
          </div>
          <div class="Submenu">
            <div class="icon-star"></div>
            <h3>Favoritos</h3>
          </div>
        </div>
        <div class="Divider">.</div>
        <div>
          <h5>Account</h5>
          <h4>Amanda Flávia</h4>
          <h4>João Paulo</h4>
        </div>
        <div class="Divider">.</div>
        <div class="Logout">
          <div class="icon-bell"></div>
          <div class="icon-user-round"></div>
          <div>João Paulo</div>
          <div class="icon-log-out" title="Sair"></div>
        </div>
      </nav>
      <div class="Right">
        <div class="sticky-banner">
          <div class="banner-container">
            <iframe
              id="main-player"
              class="video-banner"
              src="https://www.youtube.com/embed/62bIsvRcPv0?autoplay=1&mute=1&controls=0&rel=0&enablejsapi=1"
              title="YouTube video player"
              frameborder="0"
              allow="
                accelerometer;
                autoplay;
                clipboard-write;
                encrypted-media;
                gyroscope;
                picture-in-picture;
                web-share;
              "
              referrerpolicy="strict-origin-when-cross-origin"
              allowfullscreen
            ></iframe>
            <div id="current-movie-logo" class="current-logo-overlay"></div>
          </div>

          <div class="TopLeft">
            <div class="icon-search"></div>
            <input
              type="text"
              placeholder="Pesquisa o nome do filme ou seriado"
            />
          </div>
        </div>

        <section class="movies-section">
          <h2 class="section-title">Últimos Lançamentos</h2>
          <div class="movies-grid"></div>
        </section>
      </div>
    </div>
  </body>
</html>

<!-- Script Inteligente da API do YouTube + Consumo Dinâmico de JSON -->
<script src="https://www.youtube.com/iframe_api"></script>
<script src="script.js"></script>
